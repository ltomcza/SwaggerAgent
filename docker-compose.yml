version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: swagger_agent_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: swagger_agent_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs

volumes:
  sqlserver_data:
  app_logs:
