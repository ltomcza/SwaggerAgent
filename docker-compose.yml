version: "3.8"

services:
  postgres:
    image: postgres:18
    container_name: swagger_agent_postgres
    environment:
      POSTGRES_USER: swagger_agent
      POSTGRES_PASSWORD: YourStrong!Passw0rd
      POSTGRES_DB: swagger_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swagger_agent -d swagger_agent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build: .
    container_name: swagger_agent_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: swagger_agent
      DB_PASSWORD: YourStrong!Passw0rd
      DB_NAME: swagger_agent
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
  app_logs:
